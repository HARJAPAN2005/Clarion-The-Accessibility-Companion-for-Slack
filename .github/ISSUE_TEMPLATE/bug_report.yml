name: Bug Report
description: Report a problem with Clarion.
title: "bug: <short description>"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report this issue. Please fill in as much detail as you can — it helps us fix the problem faster.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Run Clarion with Socket Mode
        2. Send '@Clarion ...' in a channel
        3. Observe the error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Which mode are you running?
      options:
        - Socket Mode (app.py)
        - HTTP + OAuth mode (app_oauth.py)
        - Docker
        - Not sure
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "e.g. 3.11.4"
    validations:
      required: true

  - type: input
    id: bolt
    attributes:
      label: slack-bolt version
      placeholder: "e.g. 1.28.2"

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant log lines here. Remove secrets before pasting.
      render: text

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this has not been reported before.
          required: true
        - label: I removed all secrets and tokens from my log output.
          required: true
